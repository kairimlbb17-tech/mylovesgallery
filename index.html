<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Future Skin Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#020205;
  --panel:#090912;
  --panel2:#11111d;
  --line:rgba(255,255,255,.10);
  --red:#ff174d;
  --pink:#ff2bd6;
  --violet:#8b5cf6;
  --blue:#00b7ff;
  --cyan:#00f5ff;
  --green:#00ff9c;
  --yellow:#ffd166;
  --text:#f8fafc;
  --muted:#9ca3af;
  --danger:#ff3b3b;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at 20% 0%, rgba(255,23,77,.30), transparent 30%),
    radial-gradient(circle at 85% 5%, rgba(0,245,255,.20), transparent 28%),
    radial-gradient(circle at 50% 100%, rgba(139,92,246,.20), transparent 35%),
    linear-gradient(160deg,#020205,#070711 45%,#020205);
  overflow-x:hidden;
}

body:before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
  background-size:34px 34px;
  pointer-events:none;
  opacity:.45;
  mask-image:linear-gradient(to bottom, black, transparent 90%);
}

body:after{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.04), transparent);
  transform:translateX(-120%);
  animation:scan 7s infinite;
  pointer-events:none;
}

@keyframes scan{
  0%{transform:translateX(-120%)}
  60%{transform:translateX(120%)}
  100%{transform:translateX(120%)}
}

.app{
  max-width:1180px;
  margin:auto;
  padding:14px;
  position:relative;
  z-index:1;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:10px 0 16px;
}

.brand h1{
  margin:0;
  font-size:28px;
  font-weight:1000;
  letter-spacing:.8px;
  background:linear-gradient(90deg,#fff,var(--cyan),var(--red));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 12px rgba(0,245,255,.35));
}

.brand p{
  margin:3px 0 0;
  color:var(--muted);
  font-size:12px;
}

.card{
  background:linear-gradient(145deg,rgba(17,17,29,.94),rgba(5,5,10,.94));
  border:1px solid var(--line);
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 18px 42px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.025);
  clip-path:polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
}

.neon{
  border-color:rgba(0,245,255,.28);
  box-shadow:0 0 28px rgba(0,245,255,.12),0 18px 42px rgba(0,0,0,.45);
}

h2,h3{
  margin:0 0 12px;
}

input,select,textarea{
  width:100%;
  background:#05050b;
  color:white;
  border:1px solid rgba(255,255,255,.11);
  outline:none;
  padding:13px;
  margin:6px 0;
  font-size:14px;
  clip-path:polygon(0 0, calc(100% - 11px) 0, 100% 11px, 100% 100%, 11px 100%, 0 calc(100% - 11px));
}

input:focus,select:focus,textarea:focus{
  border-color:var(--cyan);
  box-shadow:0 0 16px rgba(0,245,255,.22);
}

button{
  border:0;
  color:white;
  font-weight:900;
  cursor:pointer;
  padding:12px 14px;
  margin:4px;
  background:linear-gradient(135deg,var(--red),var(--violet));
  box-shadow:0 0 18px rgba(255,23,77,.22);
  clip-path:polygon(0 0, calc(100% - 11px) 0, 100% 11px, 100% 100%, 11px 100%, 0 calc(100% - 11px));
}

button:active{
  transform:scale(.97);
}

.btn-dark{background:#1d1d2a}
.btn-green{background:linear-gradient(135deg,#00b86b,var(--green)); color:#04100b}
.btn-blue{background:linear-gradient(135deg,#2563eb,var(--cyan))}
.btn-red{background:linear-gradient(135deg,#ff174d,#ff3b3b)}
.btn-yellow{background:linear-gradient(135deg,#ffd166,#ff8c00); color:#1d1100}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#ff2bd6)}

.hidden{display:none!important}

.login{
  max-width:480px;
  margin:7vh auto 0;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.toolbar{
  display:grid;
  grid-template-columns:1.2fr 1fr 1fr;
  gap:10px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.stat{
  background:#05050b;
  border:1px solid rgba(255,255,255,.08);
  padding:14px;
  clip-path:polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
}

.stat span{
  color:var(--muted);
  font-size:12px;
}

.stat b{
  display:block;
  margin-top:4px;
  font-size:24px;
  color:var(--green);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(315px,1fr));
  gap:14px;
}

.hero-card{
  background:linear-gradient(160deg,#10101b,#05050b);
  border:1px solid rgba(255,255,255,.09);
  padding:14px;
  position:relative;
  overflow:hidden;
  clip-path:polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
}

.hero-card:before{
  content:"";
  position:absolute;
  inset:-1px;
  background:linear-gradient(120deg,transparent,rgba(0,245,255,.16),transparent);
  transform:translateX(-120%);
  animation:shine 6s infinite;
  pointer-events:none;
}

@keyframes shine{
  0%{transform:translateX(-120%)}
  45%{transform:translateX(120%)}
  100%{transform:translateX(120%)}
}

.hero-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
  position:relative;
  z-index:1;
}

.hero-title{
  font-size:21px;
  font-weight:1000;
  text-transform:uppercase;
}

.hero-id{
  font-size:11px;
  color:var(--muted);
}

.badges{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:7px;
}

.badge{
  font-size:10px;
  color:#030306;
  background:var(--cyan);
  padding:4px 7px;
  font-weight:900;
  text-transform:uppercase;
  clip-path:polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
}

.badge.red{background:var(--red); color:white}
.badge.green{background:var(--green)}
.badge.yellow{background:var(--yellow)}
.badge.purple{background:var(--violet); color:white}
.badge.off{background:#555;color:#ddd}

.skin{
  display:grid;
  grid-template-columns:76px 1fr;
  gap:10px;
  background:#080811;
  border:1px solid rgba(255,255,255,.08);
  padding:8px;
  margin-top:10px;
  position:relative;
  clip-path:polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
}

.skin.featured{
  border-color:rgba(255,209,102,.9);
  box-shadow:0 0 18px rgba(255,209,102,.18);
}

.skin.disabled{
  opacity:.45;
  filter:grayscale(1);
}

.skin img{
  width:76px;
  height:108px;
  object-fit:cover;
  background:#1f1f2a;
  clip-path:polygon(0 0, calc(100% - 9px) 0, 100% 9px, 100% 100%, 9px 100%, 0 calc(100% - 9px));
}

.skin-title{
  font-weight:900;
  font-size:13px;
}

.small{
  font-size:11px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.actions{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
  margin-top:7px;
}

.preview{
  display:flex;
  gap:12px;
  align-items:center;
  background:#05050b;
  border:1px solid rgba(255,255,255,.08);
  padding:10px;
  margin-top:8px;
}

.preview img{
  width:88px;
  height:126px;
  object-fit:cover;
  background:#222;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.86);
  display:none;
  align-items:center;
  justify-content:center;
  padding:14px;
  z-index:50;
}

.modal-box{
  width:100%;
  max-width:560px;
  max-height:90vh;
  overflow:auto;
  background:linear-gradient(145deg,#11111d,#05050b);
  border:1px solid rgba(0,245,255,.35);
  box-shadow:0 0 45px rgba(0,245,255,.18);
  padding:16px;
  clip-path:polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
}

#log{
  height:120px;
  overflow:auto;
  background:#020204;
  color:#00ff9c;
  padding:10px;
  font-size:12px;
  border:1px solid rgba(0,255,156,.18);
}

.analytics-list{
  display:grid;
  gap:8px;
}

.analytics-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#05050b;
  padding:10px;
  border:1px solid rgba(255,255,255,.07);
}

@media(max-width:740px){
  .app{padding:10px}
  .topbar{align-items:flex-start; flex-direction:column}
  .brand h1{font-size:23px}
  .row,.toolbar,.stats{grid-template-columns:1fr}
  .grid{grid-template-columns:1fr}
  button{width:100%; margin:4px 0}
  .actions button{width:auto; flex:1; font-size:11px; padding:10px 8px}
  .skin{grid-template-columns:70px 1fr}
  .skin img{width:70px;height:100px}
}
</style>
</head>

<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <h1>⚔️ FUTURE SKIN ADMIN</h1>
      <p>GitHub JSON CMS • Phone/WebView Ready</p>
    </div>
    <button class="btn-dark" onclick="reloadAll()">Reload JSON</button>
  </div>

  <div id="loginCard" class="card neon login">
    <h2>🔐 Admin Access</h2>
    <input id="password" type="password" placeholder="Admin Password">
    <input id="token" type="password" placeholder="GitHub Token">
    <button onclick="login()">ENTER PANEL</button>
    <p style="color:#aaa;font-size:12px">
      Token nasa HTML/WebView, kaya pang private admin use lang ito.
    </p>
  </div>

  <div id="panel" class="hidden">

    <div class="card">
      <div class="stats">
        <div class="stat"><span>Heroes</span><b id="statHeroes">0</b></div>
        <div class="stat"><span>Skins</span><b id="statSkins">0</b></div>
        <div class="stat"><span>Featured</span><b id="statFeatured">0</b></div>
        <div class="stat"><span>Enabled</span><b id="statEnabled">0</b></div>
      </div>
    </div>

    <div class="card neon">
      <h2>➕ Add Hero</h2>
      <div class="row">
        <input id="newHeroName" placeholder="Hero name">
        <select id="newHeroCategory">
          <option value="assassin">Assassin</option>
          <option value="fighter">Fighter</option>
          <option value="mage">Mage</option>
          <option value="marksman">Marksman</option>
          <option value="tank">Tank</option>
          <option value="support">Support</option>
        </select>
      </div>
      <button class="btn-green" onclick="addHero()">ADD HERO ONLY</button>
    </div>

    <div class="card">
      <h2>🔎 Search / Filter</h2>
      <div class="toolbar">
        <input id="search" placeholder="Search hero / skin URL / tag..." oninput="render()">
        <select id="filterCategory" onchange="render()">
          <option value="all">All Categories</option>
          <option value="assassin">Assassin</option>
          <option value="fighter">Fighter</option>
          <option value="mage">Mage</option>
          <option value="marksman">Marksman</option>
          <option value="tank">Tank</option>
          <option value="support">Support</option>
        </select>
        <select id="filterStatus" onchange="render()">
          <option value="all">All Status</option>
          <option value="featured">Featured Only</option>
          <option value="enabled">Enabled Only</option>
          <option value="disabled">Disabled Only</option>
        </select>
      </div>
    </div>

    <div class="card">
      <h2>🧩 Heroes</h2>
      <div id="heroesList" class="grid"></div>
    </div>

    <div class="card">
      <h2>📈 Analytics</h2>
      <div id="analytics" class="analytics-list"></div>
    </div>

    <div class="card">
      <h3>📟 Logs</h3>
      <div id="log"></div>
    </div>

  </div>
</div>

<div class="modal" id="skinModal">
  <div class="modal-box">
    <h2 id="modalTitle">Add Skin</h2>

    <input id="skinImage" placeholder="Image URL" oninput="livePreview(); smartTag();">
    <input id="skinScript" placeholder="Script ZIP URL" oninput="smartTag();">
    <input id="skinTags" placeholder="Tags: legend, starlight, anime">

    <div class="row">
      <select id="skinFeatured">
        <option value="false">Normal</option>
        <option value="true">Featured / Highlight</option>
      </select>

      <select id="skinEnabled">
        <option value="true">Enabled / Visible</option>
        <option value="false">Disabled / Hidden</option>
      </select>
    </div>

    <div class="preview">
      <img id="previewImg" src="">
      <div>
        <b>Live Preview</b>
        <div class="small" id="previewText">Paste image URL...</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-green" onclick="saveSkinModal()">SAVE SKIN</button>
      <button class="btn-dark" onclick="closeModal()">CANCEL</button>
    </div>
  </div>
</div>

<script>
const PASS = "123456";

const OWNER = "kairimlbb17-tech";
const REPO = "shesh";
const FILE = "skins.json";
const BRANCH = "main";

const CATEGORIES = ["assassin","fighter","mage","marksman","tank","support"];

let TOKEN = "";
let SHA = "";
let DATA = { heroes: [] };

let currentHeroIndex = null;
let currentSkinIndex = null;

const API = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;

function slugify(text){
  return String(text || "")
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"");
}

function makeHeroId(name){
  let base = slugify(name) || "hero";
  let id = base;
  let n = 2;
  while(DATA.heroes.some(h => h.id === id)){
    id = `${base}_${n}`;
    n++;
  }
  return id;
}

function makeSkinId(hero){
  let n = hero.skins.length + 1;
  let id = `${hero.id}_${String(n).padStart(3,"0")}`;
  while(hero.skins.some(s => s.id === id)){
    n++;
    id = `${hero.id}_${String(n).padStart(3,"0")}`;
  }
  return id;
}

function log(msg){
  const box = document.getElementById("log");
  if(!box) return;
  box.innerText += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  box.scrollTop = box.scrollHeight;
}

function login(){
  const p = document.getElementById("password").value.trim();
  TOKEN = document.getElementById("token").value.trim();

  if(p !== PASS){
    alert("Wrong password");
    return;
  }
  if(!TOKEN){
    alert("Enter GitHub token");
    return;
  }

  document.getElementById("loginCard").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  loadData();
}

function normalizeData(){
  if(!DATA.heroes) DATA.heroes = [];

  DATA.heroes.forEach(hero=>{
    if(!hero.id) hero.id = makeHeroId(hero.name);
    if(!hero.name) hero.name = hero.id;
    if(!hero.category) hero.category = "assassin";
    if(!CATEGORIES.includes(hero.category)) hero.category = "assassin";
    if(typeof hero.enabled === "undefined") hero.enabled = true;
    if(!hero.skins) hero.skins = [];

    hero.skins.forEach((skin, index)=>{
      if(!skin.id) skin.id = `${hero.id}_${String(index + 1).padStart(3,"0")}`;
      if(typeof skin.featured === "undefined") skin.featured = false;
      if(typeof skin.enabled === "undefined") skin.enabled = true;
      if(!skin.tags) skin.tags = smartTagsFromText(`${skin.image} ${skin.script} ${hero.name}`);
      if(typeof skin.clicks === "undefined") skin.clicks = 0;
    });
  });
}

async function loadData(){
  try{
    log("Loading skins.json...");

    const res = await fetch(`${API}?ref=${BRANCH}`, {
      headers:{
        "Authorization":`Bearer ${TOKEN}`,
        "Accept":"application/vnd.github+json"
      }
    });

    const file = await res.json();

    if(!res.ok){
      log(JSON.stringify(file,null,2));
      alert("Failed to load JSON");
      return;
    }

    SHA = file.sha;
    const text = decodeURIComponent(escape(atob(file.content.replace(/\n/g,""))));
    DATA = JSON.parse(text);

    normalizeData();
    render();
    log("Loaded successfully.");
  }catch(e){
    log(e.toString());
  }
}

async function saveToGithub(message){
  try{
    normalizeData();

    log("Fetching latest SHA...");

    const latest = await fetch(`${API}?ref=${BRANCH}`, {
      headers:{
        "Authorization":`Bearer ${TOKEN}`,
        "Accept":"application/vnd.github+json"
      }
    });

    const latestFile = await latest.json();

    if(!latest.ok){
      log(JSON.stringify(latestFile,null,2));
      alert("Cannot get latest file SHA");
      return;
    }

    SHA = latestFile.sha;

    log("Saving to GitHub...");

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(DATA,null,2))));

    const res = await fetch(API,{
      method:"PUT",
      headers:{
        "Authorization":`Bearer ${TOKEN}`,
        "Accept":"application/vnd.github+json",
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message,
        content,
        sha:SHA,
        branch:BRANCH
      })
    });

    const result = await res.json();

    if(!res.ok){
      log(JSON.stringify(result,null,2));
      alert("Save failed. Check token Contents Read/Write permission.");
      return;
    }

    SHA = result.content.sha;
    render();
    log("Saved ✅");
  }catch(e){
    log(e.toString());
  }
}

function reloadAll(){
  if(!TOKEN){
    alert("Login first");
    return;
  }
  loadData();
}

function addHero(){
  const name = document.getElementById("newHeroName").value.trim();
  const category = document.getElementById("newHeroCategory").value;

  if(!name){
    alert("Enter hero name");
    return;
  }

  const exists = DATA.heroes.find(h => h.name.toLowerCase() === name.toLowerCase());
  if(exists){
    alert("Duplicate hero name.");
    return;
  }

  DATA.heroes.push({
    id: makeHeroId(name),
    name,
    category,
    enabled: true,
    skins:[]
  });

  document.getElementById("newHeroName").value = "";
  saveToGithub(`Add hero ${name}`);
}

function editHero(index){
  const hero = DATA.heroes[index];

  const newName = prompt("Hero name:", hero.name);
  if(!newName || !newName.trim()) return;

  const newCategory = prompt("Category: assassin/fighter/mage/marksman/tank/support", hero.category || "assassin");
  if(!newCategory || !newCategory.trim()) return;

  const cleanCategory = newCategory.trim().toLowerCase();

  if(!CATEGORIES.includes(cleanCategory)){
    alert("Invalid category.");
    return;
  }

  hero.name = newName.trim();
  hero.category = cleanCategory;

  saveToGithub(`Edit hero ${hero.name}`);
}

function toggleHero(index){
  DATA.heroes[index].enabled = !DATA.heroes[index].enabled;
  saveToGithub(`Toggle hero ${DATA.heroes[index].name}`);
}

function deleteHero(index){
  if(!confirm("Delete hero and all skins?")) return;

  const name = DATA.heroes[index].name;
  DATA.heroes.splice(index,1);
  saveToGithub(`Delete hero ${name}`);
}

function openAddSkin(heroIndex){
  currentHeroIndex = heroIndex;
  currentSkinIndex = null;

  const hero = DATA.heroes[heroIndex];

  document.getElementById("modalTitle").innerText = `Add Skin to ${hero.name}`;
  document.getElementById("skinImage").value = "";
  document.getElementById("skinScript").value = "";
  document.getElementById("skinTags").value = "";
  document.getElementById("skinFeatured").value = "false";
  document.getElementById("skinEnabled").value = "true";
  livePreview();

  document.getElementById("skinModal").style.display = "flex";
}

function openEditSkin(heroIndex, skinIndex){
  currentHeroIndex = heroIndex;
  currentSkinIndex = skinIndex;

  const hero = DATA.heroes[heroIndex];
  const skin = hero.skins[skinIndex];

  document.getElementById("modalTitle").innerText = `Edit Skin - ${hero.name}`;
  document.getElementById("skinImage").value = skin.image || "";
  document.getElementById("skinScript").value = skin.script || "";
  document.getElementById("skinTags").value = (skin.tags || []).join(", ");
  document.getElementById("skinFeatured").value = skin.featured ? "true" : "false";
  document.getElementById("skinEnabled").value = skin.enabled ? "true" : "false";
  livePreview();

  document.getElementById("skinModal").style.display = "flex";
}

function saveSkinModal(){
  const image = document.getElementById("skinImage").value.trim();
  const script = document.getElementById("skinScript").value.trim();

  let tags = document.getElementById("skinTags").value
    .split(",")
    .map(x=>x.trim().toLowerCase())
    .filter(Boolean);

  const featured = document.getElementById("skinFeatured").value === "true";
  const enabled = document.getElementById("skinEnabled").value === "true";

  if(!image || !script){
    alert("Fill image and script URL");
    return;
  }

  const hero = DATA.heroes[currentHeroIndex];

  const duplicate = hero.skins.find((s,i)=>{
    if(currentSkinIndex !== null && i === currentSkinIndex) return false;
    return s.image === image || s.script === script;
  });

  if(duplicate){
    alert("Duplicate detected: same image or script already exists in this hero.");
    return;
  }

  if(tags.length === 0){
    tags = smartTagsFromText(`${image} ${script} ${hero.name}`);
  }

  const old = currentSkinIndex !== null ? hero.skins[currentSkinIndex] : null;

  const skinData = {
    id: old ? old.id : makeSkinId(hero),
    image,
    script,
    featured,
    enabled,
    tags,
    clicks: old ? (old.clicks || 0) : 0
  };

  if(currentSkinIndex === null){
    hero.skins.push(skinData);
    closeModal();
    saveToGithub(`Add skin to ${hero.name}`);
  }else{
    hero.skins[currentSkinIndex] = skinData;
    closeModal();
    saveToGithub(`Edit skin of ${hero.name}`);
  }
}

function deleteSkin(heroIndex, skinIndex){
  if(!confirm("Delete this skin?")) return;

  const hero = DATA.heroes[heroIndex];
  hero.skins.splice(skinIndex,1);
  saveToGithub(`Delete skin from ${hero.name}`);
}

function moveSkin(heroIndex, skinIndex, dir){
  const skins = DATA.heroes[heroIndex].skins;
  const newIndex = skinIndex + dir;

  if(newIndex < 0 || newIndex >= skins.length) return;

  const temp = skins[skinIndex];
  skins[skinIndex] = skins[newIndex];
  skins[newIndex] = temp;

  saveToGithub("Reorder skins");
}

function toggleFeatured(heroIndex, skinIndex){
  const skin = DATA.heroes[heroIndex].skins[skinIndex];
  skin.featured = !skin.featured;
  saveToGithub("Toggle featured skin");
}

function toggleSkin(heroIndex, skinIndex){
  const skin = DATA.heroes[heroIndex].skins[skinIndex];
  skin.enabled = !skin.enabled;
  saveToGithub("Toggle skin visibility");
}

function recordClick(heroIndex, skinIndex){
  const skin = DATA.heroes[heroIndex].skins[skinIndex];
  skin.clicks = (skin.clicks || 0) + 1;
  render();
  saveToGithub("Add click analytics");
}

function livePreview(){
  const url = document.getElementById("skinImage").value.trim();
  const img = document.getElementById("previewImg");
  const txt = document.getElementById("previewText");

  if(!url){
    img.removeAttribute("src");
    txt.innerText = "Paste image URL...";
    return;
  }

  img.src = url;
  txt.innerText = url;
}

function smartTagsFromText(text){
  const raw = String(text || "").toLowerCase();
  const rules = [
    "legend","starlight","collector","epic","elite","special",
    "aspirant","lightborn","summer","christmas","valentine",
    "anniversary","anime","aot","luckybox","backup","default",
    "fanny","gusion","valentines"
  ];

  const tags = [];

  rules.forEach(tag=>{
    if(raw.includes(tag)) tags.push(tag === "valentines" ? "valentine" : tag);
  });

  return [...new Set(tags)];
}

function smartTag(){
  const image = document.getElementById("skinImage").value;
  const script = document.getElementById("skinScript").value;
  const tags = smartTagsFromText(`${image} ${script}`);

  if(tags.length){
    document.getElementById("skinTags").value = tags.join(", ");
  }
}

function closeModal(){
  document.getElementById("skinModal").style.display = "none";
}

function render(){
  normalizeData();

  const q = document.getElementById("search").value.toLowerCase();
  const cat = document.getElementById("filterCategory").value;
  const status = document.getElementById("filterStatus").value;

  const list = document.getElementById("heroesList");
  list.innerHTML = "";

  let totalSkins = 0;
  let totalFeatured = 0;
  let totalEnabled = 0;

  DATA.heroes.forEach((hero,hi)=>{
    totalSkins += hero.skins.length;

    hero.skins.forEach(s=>{
      if(s.featured) totalFeatured++;
      if(s.enabled) totalEnabled++;
    });

    if(cat !== "all" && hero.category !== cat) return;

    const heroMatches = [
      hero.id,
      hero.name,
      hero.category
    ].join(" ").toLowerCase().includes(q);

    let skins = hero.skins
      .map((skin,si)=>({skin,si}))
      .filter(obj=>{
        const skin = obj.skin;

        if(status === "featured" && !skin.featured) return false;
        if(status === "enabled" && !skin.enabled) return false;
        if(status === "disabled" && skin.enabled) return false;

        const searchable = [
          hero.id,
          hero.name,
          hero.category,
          skin.id,
          skin.image,
          skin.script,
          ...(skin.tags || [])
        ].join(" ").toLowerCase();

        return !q || heroMatches || searchable.includes(q);
      });

    if(q && !heroMatches && skins.length === 0) return;

    const card = document.createElement("div");
    card.className = "hero-card";

    let skinsHtml = "";

    skins.forEach(({skin,si})=>{
      skinsHtml += `
        <div class="skin ${skin.featured ? "featured" : ""} ${skin.enabled ? "" : "disabled"}">
          <img src="${skin.image}" onerror="this.style.opacity=.25">
          <div>
            <div class="skin-title">${skin.featured ? "⭐ Featured" : "Skin"} • ${skin.enabled ? "ON" : "OFF"}</div>
            <div class="small">ID: ${skin.id}</div>
            <div class="small">IMG: ${skin.image}</div>
            <div class="small">ZIP: ${skin.script}</div>
            <div class="badges">
              ${(skin.tags || []).map(t=>`<span class="badge purple">${t}</span>`).join("")}
              <span class="badge green">${skin.clicks || 0} clicks</span>
            </div>
            <div class="actions">
              <button class="btn-blue" onclick="openEditSkin(${hi},${si})">Edit</button>
              <button class="btn-yellow" onclick="toggleFeatured(${hi},${si})">★</button>
              <button class="btn-dark" onclick="toggleSkin(${hi},${si})">${skin.enabled ? "Disable" : "Enable"}</button>
              <button class="btn-dark" onclick="moveSkin(${hi},${si},-1)">↑</button>
              <button class="btn-dark" onclick="moveSkin(${hi},${si},1)">↓</button>
              <button class="btn-purple" onclick="recordClick(${hi},${si})">+Click</button>
              <button class="btn-red" onclick="deleteSkin(${hi},${si})">Delete</button>
            </div>
          </div>
        </div>
      `;
    });

    card.innerHTML = `
      <div class="hero-head">
        <div>
          <div class="hero-title">${hero.name}</div>
          <div class="hero-id">ID: ${hero.id}</div>
          <div class="badges">
            <span class="badge red">${hero.category}</span>
            <span class="badge">${hero.skins.length} skins</span>
            <span class="badge ${hero.enabled ? "green" : "off"}">${hero.enabled ? "hero on" : "hero off"}</span>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-green" onclick="openAddSkin(${hi})">+ Add Skin</button>
        <button class="btn-blue" onclick="editHero(${hi})">Edit Hero</button>
        <button class="btn-dark" onclick="toggleHero(${hi})">${hero.enabled ? "Disable Hero" : "Enable Hero"}</button>
        <button class="btn-red" onclick="deleteHero(${hi})">Delete Hero</button>
      </div>

      ${skinsHtml || `<div style="color:#777;margin-top:12px">No matching skins.</div>`}
    `;

    list.appendChild(card);
  });

  document.getElementById("statHeroes").innerText = DATA.heroes.length;
  document.getElementById("statSkins").innerText = totalSkins;
  document.getElementById("statFeatured").innerText = totalFeatured;
  document.getElementById("statEnabled").innerText = totalEnabled;

  renderAnalytics();
}

function renderAnalytics(){
  const box = document.getElementById("analytics");

  let rows = [];

  DATA.heroes.forEach(hero=>{
    hero.skins.forEach(skin=>{
      rows.push({
        hero:hero.name,
        category:hero.category,
        clicks:skin.clicks || 0,
        featured:skin.featured,
        enabled:skin.enabled
      });
    });
  });

  rows.sort((a,b)=>b.clicks-a.clicks);
  rows = rows.slice(0,10);

  if(rows.length === 0){
    box.innerHTML = `<div style="color:#777">No analytics yet.</div>`;
    return;
  }

  box.innerHTML = rows.map(r=>`
    <div class="analytics-item">
      <span>${r.featured ? "⭐ " : ""}${r.hero} <small style="color:#888">${r.category}</small></span>
      <b>${r.clicks} clicks</b>
    </div>
  `).join("");
}
</script>
</body>
