<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Warlito Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
:root{
  --bg:#050509;
  --card:#11111b;
  --card2:#080811;
  --line:rgba(255,255,255,.10);
  --text:#f7f7ff;
  --muted:#8f91a5;
  --red:#ff174d;
  --purple:#8b5cf6;
  --cyan:#00f5ff;
  --green:#00ff9c;
  --yellow:#ffd166;
}
*{box-sizing:border-box;max-width:100%;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;min-height:100%;overflow-x:hidden}
body{
  color:var(--text);
  font-family:"Segoe UI",Arial,sans-serif;
  background:
    radial-gradient(circle at 0 0,rgba(255,23,77,.22),transparent 32%),
    radial-gradient(circle at 100% 0,rgba(0,245,255,.14),transparent 30%),
    linear-gradient(145deg,#050508,#090915 55%,#050508);
}
body:before{
  content:"";
  position:fixed;inset:0;
  background:
    linear-gradient(rgba(255,255,255,.026) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.026) 1px,transparent 1px);
  background-size:34px 34px;
  pointer-events:none;
}
.app{width:100%;max-width:1000px;margin:auto;padding:12px;position:relative;z-index:1}
.cut{clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px))}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:8px 0 14px}
.brand{min-width:0}
.brand h1{
  margin:0;font-size:24px;font-weight:900;letter-spacing:.3px;
  background:linear-gradient(90deg,#fff,var(--cyan),var(--red));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.brand p{margin:3px 0 0;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card{
  background:linear-gradient(145deg,rgba(20,20,32,.95),rgba(8,8,15,.97));
  border:1px solid var(--line);
  padding:14px;margin-bottom:13px;
  box-shadow:0 16px 40px rgba(0,0,0,.38)
}
.cardGlow{border-color:rgba(255,23,77,.32);box-shadow:0 0 24px rgba(255,23,77,.12),0 16px 40px rgba(0,0,0,.38)}
.title{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:900;margin-bottom:10px}
input,select{
  width:100%;min-width:0;color:white;background:#080811;border:1px solid rgba(255,255,255,.10);
  outline:none;padding:12px;margin:5px 0;font-size:14px;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))
}
input:focus,select:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(255,23,77,.08)}
button{
  border:0;color:white;background:linear-gradient(135deg,var(--red),var(--purple));
  padding:11px 12px;min-height:40px;font-size:13px;font-weight:900;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))
}
button:disabled{opacity:.45;filter:grayscale(1);pointer-events:none}
button:active{transform:scale(.97)}
.btnDark{background:#232333}
.btnGreen{background:linear-gradient(135deg,#00b86b,var(--green));color:#06110c}
.btnBlue{background:linear-gradient(135deg,#2563eb,var(--cyan));color:#031018}
.btnRed{background:linear-gradient(135deg,#ff174d,#ff3b3b)}
.btnYellow{background:linear-gradient(135deg,#ffd166,#ff8c00);color:#1b1100}
.hidden{display:none!important}
.login{max-width:430px;margin:8vh auto 0}
.row,.toolbar,.stats{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:760px){.row{grid-template-columns:1fr 1fr}.toolbar{grid-template-columns:1.3fr 1fr 1fr}.stats{grid-template-columns:repeat(3,1fr)}}
.stat{background:#080811;border:1px solid rgba(255,255,255,.08);padding:13px}
.stat span{color:var(--muted);font-size:12px}.stat b{display:block;margin-top:4px;font-size:23px;color:var(--green)}
.grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:820px){.grid{grid-template-columns:repeat(2,1fr)}}
.hero{background:linear-gradient(160deg,#11111c,#07070d);border:1px solid rgba(255,255,255,.08);padding:13px;min-width:0;overflow:hidden}
.heroHead{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.heroTop{min-width:0;flex:1}
.heroName{font-size:24px;line-height:1;font-weight:900;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.heroId{margin-top:4px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.badge{
  max-width:100%;font-size:10px;font-weight:900;color:#050508;background:var(--cyan);
  padding:5px 7px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px))
}
.badgeRed{background:var(--red);color:white}.badgeGreen{background:var(--green)}.badgeYellow{background:var(--yellow)}
.badgePurple{background:var(--purple);color:white}.badgeOff{background:#555;color:#eee}
.unsavedBadge{background:var(--yellow);color:#151000}
.actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:10px}
.actions button{width:100%;margin:0;min-width:0}
@media(min-width:520px){.actions{grid-template-columns:repeat(4,minmax(0,1fr))}}
.skinList.collapsed{display:none}
.skin{
  display:grid;grid-template-columns:72px minmax(0,1fr);gap:10px;background:#090911;
  border:1px solid rgba(255,255,255,.08);padding:8px;margin-top:10px;min-width:0;overflow:hidden
}
.skin.featured{border-color:rgba(255,209,102,.75);box-shadow:0 0 16px rgba(255,209,102,.10)}
.skin.disabled{opacity:.45;filter:grayscale(1)}
.skin img{width:72px;height:100px;object-fit:cover;background:#1f1f2a;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
.skinBody{min-width:0;overflow:hidden}.skinTitle{font-weight:900;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.small{display:block;width:100%;color:var(--muted);font-size:11px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.skin .actions{grid-template-columns:repeat(3,minmax(0,1fr))}
.skin .actions button{font-size:11px;padding:9px 6px;min-height:35px}
.modal{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.78);padding:10px;z-index:99
}
.modalBox{
  width:100%;max-width:520px;max-height:90vh;overflow:auto;
  background:linear-gradient(145deg,#141420,#080811);
  border:1px solid rgba(255,23,77,.32);padding:14px;
  box-shadow:0 0 45px rgba(255,23,77,.15)
}
.preview{display:grid;grid-template-columns:78px minmax(0,1fr);gap:10px;background:#090911;border:1px solid rgba(255,255,255,.08);padding:9px;margin-top:9px;align-items:center}
.preview img{width:78px;height:108px;object-fit:cover;background:#222}
#log{height:105px;overflow:auto;background:#050509;color:var(--green);border:1px solid rgba(0,255,156,.16);padding:10px;font-size:12px}
.loading{
  position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:150;display:none;
  align-items:center;justify-content:center;padding:20px
}
.loadingBox{
  width:100%;max-width:330px;background:linear-gradient(145deg,#151522,#07070d);
  border:1px solid rgba(0,245,255,.25);padding:18px;text-align:center
}
.loader{
  width:42px;height:42px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--cyan);
  margin:0 auto 12px;border-radius:50%;animation:spin .8s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{
  position:fixed;left:12px;right:12px;bottom:18px;background:#101018;border:1px solid rgba(0,245,255,.22);
  color:white;padding:12px;z-index:160;display:none
}
</style>
</head>

<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <h1>Warlito Admin Panel</h1>
      <p>Batch Save Mode • Opera GX Style</p>
    </div>
    <button class="btnDark" onclick="reloadAll()">⟳ Reload</button>
  </div>

  <div id="loginCard" class="card cut cardGlow login">
    <div class="title">Admin Login</div>
    <input id="password" type="password" placeholder="Admin password">
    <input id="token" type="password" placeholder="GitHub token">
    <button class="btnBlue" onclick="login()">Enter Dashboard</button>
  </div>

  <div id="panel" class="hidden">

    <div class="card cut cardGlow">
      <div class="title">Publish Center</div>
      <div class="badges">
        <span id="saveStatus" class="badge badgeGreen">Saved</span>
      </div>
      <div class="actions" style="grid-template-columns:1fr 1fr">
        <button class="btnGreen" onclick="publishChanges()">Publish Changes</button>
        <button class="btnDark" onclick="discardChanges()">Discard / Reload</button>
      </div>
      <div class="actions" style="grid-template-columns:1fr 1fr">
        <button class="btnDark" onclick="logout()">Logout</button>
        <button class="btnDark" onclick="clearSavedLogin()">Clear Saved Login</button>
      </div>
    </div>

    <div class="card cut">
      <div class="stats">
        <div class="stat cut"><span>Heroes</span><b id="statHeroes">0</b></div>
        <div class="stat cut"><span>Skins</span><b id="statSkins">0</b></div>
        <div class="stat cut"><span>Enabled</span><b id="statEnabled">0</b></div>
      </div>
    </div>

    <div class="card cut cardGlow">
      <div class="title">+ Add Hero</div>
      <div class="row">
        <input id="newHeroName" placeholder="Hero name">
        <select id="newHeroCategory">
          <option value="assassin">Assassin</option>
          <option value="fighter">Fighter</option>
          <option value="mage">Mage</option>
          <option value="marksman">Marksman</option>
          <option value="tank">Tank</option>
          <option value="support">Support</option>
        </select>
      </div>
      <button class="btnGreen" onclick="addHero()">Add Hero</button>
    </div>

    <div class="card cut">
      <div class="title">Search & Filter</div>
      <div class="toolbar">
        <input id="search" placeholder="Search hero, tag, URL..." oninput="render()">
        <select id="filterCategory" onchange="render()">
          <option value="all">All Categories</option>
          <option value="assassin">Assassin</option>
          <option value="fighter">Fighter</option>
          <option value="mage">Mage</option>
          <option value="marksman">Marksman</option>
          <option value="tank">Tank</option>
          <option value="support">Support</option>
        </select>
        <select id="filterStatus" onchange="render()">
          <option value="all">All Status</option>
          <option value="featured">Featured</option>
          <option value="enabled">Enabled</option>
          <option value="disabled">Disabled</option>
        </select>
      </div>
    </div>

    <div class="card cut">
      <div class="title">Heroes</div>
      <div id="heroesList" class="grid"></div>
    </div>

    <div class="card cut">
      <div class="title">Logs</div>
      <div id="log" class="cut"></div>
    </div>
  </div>
</div>

<div class="modal" id="skinModal">
  <div class="modalBox cut">
    <div class="title" id="modalTitle">Add Skin</div>
    <input id="skinImage" placeholder="Image URL" oninput="livePreview(); smartTag();">
    <input id="skinScript" placeholder="Script ZIP URL" oninput="smartTag();">
    <input id="skinTags" placeholder="Tags: legend, anime, starlight">
    <div class="row">
      <select id="skinFeatured"><option value="false">Normal</option><option value="true">Featured</option></select>
      <select id="skinEnabled"><option value="true">Enabled / Visible</option><option value="false">Disabled / Hidden</option></select>
    </div>
    <div class="preview cut">
      <img id="previewImg" src="">
      <div><b>Live Preview</b><div class="small" id="previewText">Paste image URL...</div></div>
    </div>
    <div class="actions">
      <button class="btnGreen" onclick="saveSkinModal()">Save Local</button>
      <button class="btnDark" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="modal" id="heroEditModal">
  <div class="modalBox cut">
    <div class="title">Edit Hero</div>
    <input id="editHeroName" placeholder="Hero name">
    <select id="editHeroCategory">
      <option value="assassin">Assassin</option>
      <option value="fighter">Fighter</option>
      <option value="mage">Mage</option>
      <option value="marksman">Marksman</option>
      <option value="tank">Tank</option>
      <option value="support">Support</option>
    </select>
    <div class="actions">
      <button class="btnGreen" onclick="saveHeroEdit()">Save Local</button>
      <button class="btnDark" onclick="closeHeroEdit()">Cancel</button>
    </div>
  </div>
</div>

<div class="modal" id="confirmModal">
  <div class="modalBox cut">
    <div class="title" id="confirmTitle">Confirm Action</div>
    <div id="confirmDesc" style="color:var(--muted);font-size:14px;line-height:1.5"></div>
    <div class="actions">
      <button class="btnRed" id="confirmYes">Confirm</button>
      <button class="btnDark" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<div class="loading" id="loading">
  <div class="loadingBox cut">
    <div class="loader"></div>
    <b id="loadingText">Processing...</b>
    <div style="color:var(--muted);font-size:12px;margin-top:6px">Please wait, do not tap buttons.</div>
  </div>
</div>

<div class="toast cut" id="toast"></div>

<script>
const PASS = "123456";
const OWNER = "kairimlbb17-tech";
const REPO = "shesh";
const FILE = "skins.json";
const BRANCH = "main";
const CATEGORIES = ["assassin","fighter","mage","marksman","tank","support"];
const API = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;

let TOKEN = "";
let SHA = "";
let DATA = { heroes: [] };
let ORIGINAL = null;
let dirty = false;
let currentHeroIndex = null;
let currentSkinIndex = null;
let currentEditHeroIndex = null;
let collapsed = {};
let isBusy = false;

function setBusy(state,text){
  isBusy = state;
  document.querySelectorAll("button,input,select").forEach(el=>el.disabled = state);
  document.getElementById("loadingText").innerText = text || "Processing...";
  document.getElementById("loading").style.display = state ? "flex" : "none";
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2400);
}

function markDirty(){
  dirty = true;
  const s = document.getElementById("saveStatus");
  if(s){
    s.innerText = "Unsaved Changes";
    s.className = "badge unsavedBadge";
  }
}

function markSaved(){
  dirty = false;
  const s = document.getElementById("saveStatus");
  if(s){
    s.innerText = "Saved";
    s.className = "badge badgeGreen";
  }
}

function clone(obj){
  return JSON.parse(JSON.stringify(obj));
}

function slugify(text){
  return String(text||"").toLowerCase().trim().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
}

function makeHeroId(name){
  let base=slugify(name)||"hero",id=base,n=2;
  while(DATA.heroes.some(h=>h.id===id)){id=`${base}_${n}`;n++}
  return id;
}

function makeSkinId(hero){
  let n=hero.skins.length+1,id=`${hero.id}_${String(n).padStart(3,"0")}`;
  while(hero.skins.some(s=>s.id===id)){n++;id=`${hero.id}_${String(n).padStart(3,"0")}`}
  return id;
}

function log(msg){
  const box=document.getElementById("log");
  if(!box)return;
  box.innerText+=`[${new Date().toLocaleTimeString()}] ${msg}\n`;
  box.scrollTop=box.scrollHeight;
}

function saveLogin(){
  localStorage.setItem("warlito_pass",document.getElementById("password").value.trim());
  localStorage.setItem("warlito_token",TOKEN);
}

function clearSavedLogin(){
  localStorage.removeItem("warlito_pass");
  localStorage.removeItem("warlito_token");
  showToast("Saved login cleared.");
}

function logout(){
  document.getElementById("panel").classList.add("hidden");
  document.getElementById("loginCard").classList.remove("hidden");
}

function login(){
  const p=document.getElementById("password").value.trim();
  TOKEN=document.getElementById("token").value.trim();

  if(p!==PASS){showToast("Wrong password");return}
  if(!TOKEN){showToast("Enter GitHub token");return}

  saveLogin();
  document.getElementById("loginCard").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  loadData();
}

window.addEventListener("load",()=>{
  const p=localStorage.getItem("warlito_pass");
  const t=localStorage.getItem("warlito_token");
  if(p&&t){
    document.getElementById("password").value=p;
    document.getElementById("token").value=t;
    TOKEN=t;
    document.getElementById("loginCard").classList.add("hidden");
    document.getElementById("panel").classList.remove("hidden");
    loadData();
  }
});

function normalizeData(){
  if(!DATA.heroes)DATA.heroes=[];
  DATA.heroes.forEach(hero=>{
    if(!hero.id)hero.id=makeHeroId(hero.name);
    if(!hero.name)hero.name=hero.id;
    if(!hero.category)hero.category="assassin";
    if(!CATEGORIES.includes(hero.category))hero.category="assassin";
    if(typeof hero.enabled==="undefined")hero.enabled=true;
    if(!hero.skins)hero.skins=[];
    hero.skins.forEach((skin,index)=>{
      if(!skin.id)skin.id=`${hero.id}_${String(index+1).padStart(3,"0")}`;
      if(typeof skin.featured==="undefined")skin.featured=false;
      if(typeof skin.enabled==="undefined")skin.enabled=true;
      if(!skin.tags)skin.tags=smartTagsFromText(`${skin.image} ${skin.script} ${hero.name}`);
    });
  });
}

async function loadData(){
  try{
    setBusy(true,"Loading JSON...");
    log("Loading skins.json...");

    const res=await fetch(`${API}?ref=${BRANCH}`,{
      headers:{
        "Authorization":`Bearer ${TOKEN}`,
        "Accept":"application/vnd.github+json"
      }
    });

    const file=await res.json();

    if(!res.ok){
      log(JSON.stringify(file,null,2));
      showToast("Failed to load JSON");
      return;
    }

    SHA=file.sha;
    const text=decodeURIComponent(escape(atob(file.content.replace(/\n/g,""))));
    DATA=JSON.parse(text);

    normalizeData();
    ORIGINAL=clone(DATA);
    markSaved();
    render();
    log("Loaded.");
    showToast("Dashboard updated.");
  }catch(e){
    log(e.toString());
    showToast("Load error");
  }finally{
    setBusy(false);
  }
}

async function publishChanges(){
  if(!dirty){
    showToast("No changes to publish.");
    return;
  }

  showConfirm("Publish Changes","This will commit all local edits to GitHub in one update. Continue?",async()=>{
    try{
      normalizeData();
      setBusy(true,"Publishing changes...");
      log("Publishing changes...");

      const latest=await fetch(`${API}?ref=${BRANCH}`,{
        headers:{
          "Authorization":`Bearer ${TOKEN}`,
          "Accept":"application/vnd.github+json"
        }
      });

      const latestFile=await latest.json();

      if(!latest.ok){
        log(JSON.stringify(latestFile,null,2));
        showToast("Cannot get latest SHA");
        return;
      }

      SHA=latestFile.sha;

      const content=btoa(unescape(encodeURIComponent(JSON.stringify(DATA,null,2))));

      const res=await fetch(API,{
        method:"PUT",
        headers:{
          "Authorization":`Bearer ${TOKEN}`,
          "Accept":"application/vnd.github+json",
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          message:"Batch update skins.json from Warlito Admin Panel",
          content,
          sha:SHA,
          branch:BRANCH
        })
      });

      const result=await res.json();

      if(!res.ok){
        log(JSON.stringify(result,null,2));
        showToast("Publish failed. Reload then try again.");
        return;
      }

      SHA=result.content.sha;
      ORIGINAL=clone(DATA);
      markSaved();
      render();
      log("Published.");
      showToast("Published to GitHub.");
    }catch(e){
      log(e.toString());
      showToast("Publish error");
    }finally{
      setBusy(false);
    }
  });
}

function discardChanges(){
  if(!dirty){
    loadData();
    return;
  }

  showConfirm("Discard Changes","This will remove all local edits and reload the latest GitHub JSON.",()=>{
    if(ORIGINAL){
      DATA=clone(ORIGINAL);
      markSaved();
      render();
      showToast("Local changes discarded.");
    }else{
      loadData();
    }
  });
}

function reloadAll(){
  if(!TOKEN){showToast("Login first");return}

  if(dirty){
    showConfirm("Reload JSON","You have unsaved changes. Reloading will discard them.",()=>{
      loadData();
    });
  }else{
    loadData();
  }
}

function addHero(){
  const name=document.getElementById("newHeroName").value.trim();
  const category=document.getElementById("newHeroCategory").value;

  if(!name){showToast("Enter hero name");return}
  if(DATA.heroes.find(h=>h.name.toLowerCase()===name.toLowerCase())){
    showToast("Duplicate hero.");
    return;
  }

  DATA.heroes.push({id:makeHeroId(name),name,category,enabled:true,skins:[]});
  document.getElementById("newHeroName").value="";
  markDirty();
  render();
  showToast("Hero added locally.");
}

function editHero(index){
  currentEditHeroIndex=index;
  const hero=DATA.heroes[index];
  document.getElementById("editHeroName").value=hero.name;
  document.getElementById("editHeroCategory").value=hero.category;
  document.getElementById("heroEditModal").style.display="flex";
}

function saveHeroEdit(){
  const hero=DATA.heroes[currentEditHeroIndex];
  const name=document.getElementById("editHeroName").value.trim();
  const cat=document.getElementById("editHeroCategory").value;

  if(!name){showToast("Hero name required");return}

  hero.name=name;
  hero.category=cat;
  closeHeroEdit();
  markDirty();
  render();
  showToast("Hero edited locally.");
}

function closeHeroEdit(){
  document.getElementById("heroEditModal").style.display="none";
}

function toggleHero(index){
  DATA.heroes[index].enabled=!DATA.heroes[index].enabled;
  markDirty();
  render();
  showToast("Hero visibility changed locally.");
}

function deleteHero(index){
  const hero=DATA.heroes[index];
  showConfirm("Delete Hero",`Deleting "${hero.name}" will remove the hero and all ${hero.skins.length} skin(s). This cannot be undone after publish.`,()=>{
    DATA.heroes.splice(index,1);
    markDirty();
    render();
    showToast("Hero deleted locally.");
  });
}

function openAddSkin(heroIndex){
  currentHeroIndex=heroIndex;
  currentSkinIndex=null;

  const hero=DATA.heroes[heroIndex];

  document.getElementById("modalTitle").innerText=`Add Skin to ${hero.name}`;
  document.getElementById("skinImage").value="";
  document.getElementById("skinScript").value="";
  document.getElementById("skinTags").value="";
  document.getElementById("skinFeatured").value="false";
  document.getElementById("skinEnabled").value="true";
  livePreview();

  document.getElementById("skinModal").style.display="flex";
}

function openEditSkin(heroIndex,skinIndex){
  currentHeroIndex=heroIndex;
  currentSkinIndex=skinIndex;

  const hero=DATA.heroes[heroIndex];
  const skin=hero.skins[skinIndex];

  document.getElementById("modalTitle").innerText=`Edit Skin - ${hero.name}`;
  document.getElementById("skinImage").value=skin.image||"";
  document.getElementById("skinScript").value=skin.script||"";
  document.getElementById("skinTags").value=(skin.tags||[]).join(", ");
  document.getElementById("skinFeatured").value=skin.featured?"true":"false";
  document.getElementById("skinEnabled").value=skin.enabled?"true":"false";
  livePreview();

  document.getElementById("skinModal").style.display="flex";
}

function saveSkinModal(){
  const image=document.getElementById("skinImage").value.trim();
  const script=document.getElementById("skinScript").value.trim();

  let tags=document.getElementById("skinTags").value
    .split(",")
    .map(x=>x.trim().toLowerCase())
    .filter(Boolean);

  const featured=document.getElementById("skinFeatured").value==="true";
  const enabled=document.getElementById("skinEnabled").value==="true";

  if(!image||!script){
    showToast("Fill image and script URL");
    return;
  }

  const hero=DATA.heroes[currentHeroIndex];

  const duplicate=hero.skins.find((s,i)=>{
    if(currentSkinIndex!==null&&i===currentSkinIndex)return false;
    return s.image===image||s.script===script;
  });

  if(duplicate){
    showToast("Duplicate image/script exists.");
    return;
  }

  if(tags.length===0){
    tags=smartTagsFromText(`${image} ${script} ${hero.name}`);
  }

  const old=currentSkinIndex!==null?hero.skins[currentSkinIndex]:null;

  const skinData={
    id:old?old.id:makeSkinId(hero),
    image,
    script,
    featured,
    enabled,
    tags
  };

  if(currentSkinIndex===null){
    hero.skins.push(skinData);
    closeModal();
    markDirty();
    render();
    showToast("Skin added locally.");
  }else{
    hero.skins[currentSkinIndex]=skinData;
    closeModal();
    markDirty();
    render();
    showToast("Skin edited locally.");
  }
}

function deleteSkin(heroIndex,skinIndex){
  const hero=DATA.heroes[heroIndex];
  const skin=hero.skins[skinIndex];

  showConfirm("Delete Skin",`Deleting skin "${skin.id}" from ${hero.name}. This cannot be undone after publish.`,()=>{
    hero.skins.splice(skinIndex,1);
    markDirty();
    render();
    showToast("Skin deleted locally.");
  });
}

function moveSkin(heroIndex,skinIndex,dir){
  const skins=DATA.heroes[heroIndex].skins;
  const newIndex=skinIndex+dir;

  if(newIndex<0||newIndex>=skins.length)return;

  const temp=skins[skinIndex];
  skins[skinIndex]=skins[newIndex];
  skins[newIndex]=temp;

  markDirty();
  render();
  showToast("Skin order changed locally.");
}

function toggleFeatured(heroIndex,skinIndex){
  DATA.heroes[heroIndex].skins[skinIndex].featured=!DATA.heroes[heroIndex].skins[skinIndex].featured;
  markDirty();
  render();
  showToast("Featured changed locally.");
}

function toggleSkin(heroIndex,skinIndex){
  DATA.heroes[heroIndex].skins[skinIndex].enabled=!DATA.heroes[heroIndex].skins[skinIndex].enabled;
  markDirty();
  render();
  showToast("Skin visibility changed locally.");
}

function toggleCollapse(heroId){
  collapsed[heroId]=!collapsed[heroId];
  render();
}

function livePreview(){
  const url=document.getElementById("skinImage").value.trim();
  const img=document.getElementById("previewImg");
  const txt=document.getElementById("previewText");

  if(!url){
    img.removeAttribute("src");
    txt.innerText="Paste image URL...";
    return;
  }

  img.src=url;
  txt.innerText=url;
}

function smartTagsFromText(text){
  const raw=String(text||"").toLowerCase();
  const rules=["legend","starlight","collector","epic","elite","special","aspirant","lightborn","summer","christmas","valentine","anniversary","anime","aot","luckybox","backup","default","fanny","gusion","valentines"];
  const tags=[];

  rules.forEach(tag=>{
    if(raw.includes(tag))tags.push(tag==="valentines"?"valentine":tag);
  });

  return[...new Set(tags)];
}

function smartTag(){
  const tags=smartTagsFromText(`${document.getElementById("skinImage").value} ${document.getElementById("skinScript").value}`);
  if(tags.length)document.getElementById("skinTags").value=tags.join(", ");
}

function closeModal(){
  document.getElementById("skinModal").style.display="none";
}

function showConfirm(title,desc,yesFn){
  document.getElementById("confirmTitle").innerText=title;
  document.getElementById("confirmDesc").innerText=desc;
  document.getElementById("confirmYes").onclick=()=>{
    closeConfirm();
    yesFn();
  };
  document.getElementById("confirmModal").style.display="flex";
}

function closeConfirm(){
  document.getElementById("confirmModal").style.display="none";
}

function render(){
  normalizeData();

  const q=document.getElementById("search").value.toLowerCase();
  const cat=document.getElementById("filterCategory").value;
  const status=document.getElementById("filterStatus").value;

  const list=document.getElementById("heroesList");
  list.innerHTML="";

  let totalSkins=0,totalEnabled=0;

  DATA.heroes.forEach((hero,hi)=>{
    totalSkins+=hero.skins.length;
    hero.skins.forEach(s=>{if(s.enabled)totalEnabled++});

    if(cat!=="all"&&hero.category!==cat)return;

    const heroMatches=[hero.id,hero.name,hero.category].join(" ").toLowerCase().includes(q);

    let skins=hero.skins.map((skin,realIndex)=>({skin,realIndex})).filter(obj=>{
      const skin=obj.skin;

      if(status==="featured"&&!skin.featured)return false;
      if(status==="enabled"&&!skin.enabled)return false;
      if(status==="disabled"&&skin.enabled)return false;

      const searchable=[hero.id,hero.name,hero.category,skin.id,skin.image,skin.script,...(skin.tags||[])].join(" ").toLowerCase();

      return !q||heroMatches||searchable.includes(q);
    });

    if(q&&!heroMatches&&skins.length===0)return;

    if(typeof collapsed[hero.id]==="undefined")collapsed[hero.id]=true;

    const card=document.createElement("div");
    card.className="hero cut";

    let skinsHtml="";

    skins.forEach(({skin,realIndex})=>{
      skinsHtml+=`
      <div class="skin cut ${skin.featured?"featured":""} ${skin.enabled?"":"disabled"}">
        <img src="${skin.image}" onerror="this.style.opacity=.25">
        <div class="skinBody">
          <div class="skinTitle">${skin.featured?"Featured Skin":"Skin"} • ${skin.enabled?"Visible":"Hidden"}</div>
          <div class="small">ID: ${skin.id}</div>
          <div class="small">IMG: ${skin.image}</div>
          <div class="small">ZIP: ${skin.script}</div>
          <div class="badges">${(skin.tags||[]).map(t=>`<span class="badge badgePurple">${t}</span>`).join("")}</div>
          <div class="actions">
            <button class="btnBlue" onclick="openEditSkin(${hi},${realIndex})">Edit</button>
            <button class="btnYellow" onclick="toggleFeatured(${hi},${realIndex})">★</button>
            <button class="btnDark" onclick="toggleSkin(${hi},${realIndex})">${skin.enabled?"Hide":"Show"}</button>
            <button class="btnDark" onclick="moveSkin(${hi},${realIndex},-1)">↑</button>
            <button class="btnDark" onclick="moveSkin(${hi},${realIndex},1)">↓</button>
            <button class="btnRed" onclick="deleteSkin(${hi},${realIndex})">Delete</button>
          </div>
        </div>
      </div>`;
    });

    card.innerHTML=`
      <div class="heroHead">
        <div class="heroTop">
          <div class="heroName">${hero.name}</div>
          <div class="heroId">ID: ${hero.id}</div>
          <div class="badges">
            <span class="badge badgeRed">${hero.category}</span>
            <span class="badge">${hero.skins.length} skins</span>
            <span class="badge ${hero.enabled?"badgeGreen":"badgeOff"}">${hero.enabled?"visible":"hidden"}</span>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btnDark" onclick="toggleCollapse('${hero.id}')">${collapsed[hero.id]?"Expand":"Minimize"}</button>
        <button class="btnGreen" onclick="openAddSkin(${hi})">+ Skin</button>
        <button class="btnBlue" onclick="editHero(${hi})">Edit</button>
        <button class="btnDark" onclick="toggleHero(${hi})">${hero.enabled?"Hide":"Show"}</button>
        <button class="btnRed" onclick="deleteHero(${hi})">Delete</button>
      </div>

      <div class="skinList ${collapsed[hero.id]?"collapsed":""}">
        ${skinsHtml||`<div style="color:#777;margin-top:12px">No skins found.</div>`}
      </div>`;

    list.appendChild(card);
  });

  document.getElementById("statHeroes").innerText=DATA.heroes.length;
  document.getElementById("statSkins").innerText=totalSkins;
  document.getElementById("statEnabled").innerText=totalEnabled;
}
</script>
</body>
</html>
